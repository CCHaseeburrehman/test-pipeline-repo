name: ASVP Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ASVP Security Scan
        env:
          ASVP_API_TOKEN: ${{ secrets.ASVP_API_TOKEN }}
          ASVP_BASE_URL: ${{ secrets.ASVP_BASE_URL }}
        run: |
          echo "Starting ASVP scan..."
          PR_ID="${{ github.event.pull_request.number }}"
          if [ "$PR_ID" == "null" ]; then PR_ID=""; fi
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $ASVP_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "target": "https://staging.averox.com",
              "profile": "standard",
              "commitSha": "${{ github.sha }}",
              "branchName": "${{ github.ref_name }}",
              "pullRequestId": "'"$PR_ID"'"
            }' \
            $ASVP_BASE_URL/api/cli/scan)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP response code: $HTTP_CODE"

          # Save the raw response for debugging
          echo "$BODY" > scan-result.raw
          echo "Raw response saved to scan-result.raw"

          # Check if response is JSON
          if echo "$BODY" | jq empty 2>/dev/null; then
            echo "$BODY" > scan-result.json
            echo "Valid JSON received."
          else
            echo "Response is not JSON (HTML or invalid). Converting to JSON..."
            # Wrap HTML as JSON
            echo "{\"html_response\": $(jq -R -s '.' <<<"$BODY")}" > scan-result.json
          fi

      - name: Check Thresholds
        run: |
          CRITICAL=$(jq '.summary.critical // 0' scan-result.json)
          HIGH=$(jq '.summary.high // 0' scan-result.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Critical findings found!"
            exit 1
          fi

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: asvp-scan-results
          path: scan-result.json
