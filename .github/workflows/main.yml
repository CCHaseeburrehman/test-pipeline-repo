name: ASVP Security Scan with Source Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  asvp-source-scan:
    runs-on: ubuntu-latest
    env:
      ASVP_URL: ${{ secrets.ASVP_BASE_URL }}
      ASVP_TOKEN: ${{ secrets.ASVP_API_TOKEN }}
      TARGET_URL: "https://vc.averox.com"
      SCAN_DIR: "."          # must point to the repository root for Trivy/SAST

    steps:
      - uses: actions/checkout@v4

      - name: Preflight (curl, jq, secrets)
        run: |
          set -euo pipefail
          command -v curl >/dev/null || { echo "::error::curl is required"; exit 1; }
          command -v jq >/dev/null || { echo "::error::jq is required"; exit 1; }
          [ -n "$ASVP_TOKEN" ] || { echo "::error::ASVP_API_TOKEN missing"; exit 1; }
          [ -n "$ASVP_URL" ] || { echo "::error::ASVP_BASE_URL missing"; exit 1; }
          echo "ASVP_URL=${ASVP_URL%/}" >> "$GITHUB_ENV"

      - name: Trigger ASVP scan
        id: trigger
        run: |
          set -euo pipefail
          BODY="$(mktemp)"
          META="$(curl -sS --max-time 60 -o "$BODY" -w '%{http_code} %{content_type}' \
            -X POST "$ASVP_URL/api/cicd/scan" \
            -H "Authorization: Bearer $ASVP_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg url "$TARGET_URL" --arg sha "$GITHUB_SHA" --arg br "$GITHUB_REF_NAME" --arg pr "${{ github.event.pull_request.number }}" '{targetUrl:$url, profile:"standard", triggeredBy:"github-actions", commitSha:$sha, branchName:$br, pullRequestId:$pr}')")"
          CODE="$(echo "$META" | cut -d' ' -f1)"
          CTYPE="$(echo "$META" | cut -d' ' -f2-)"
          OUT="$(cat "$BODY")"
          jq -n --arg code "$CODE" --arg ctype "$CTYPE" --argjson body "$(echo "$OUT" | jq -c '.' 2>/dev/null || jq -n --arg raw "$OUT" '{raw:$raw}')" \
            '{endpoint:"/api/cicd/scan", httpStatus:$code, contentType:$ctype, body:$body}' > scan-trigger.json
          echo "scan_id=$(echo "$OUT" | jq -r '.scanId')" >> "$GITHUB_OUTPUT"
          echo "Registered scanId=$(echo "$OUT" | jq -r '.scanId')"

      - name: Run Trivy source scan
        if: env.SCAN_DIR != ''
        run: |
          set -euo pipefail
          command -v trivy >/dev/null 2>&1 || curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --quiet --format json --scanners vuln,secret,misconfig -o trivy-findings.json "$SCAN_DIR" || jq -n '{findings: []}' > trivy-findings.json
          jq --arg t "$TARGET_URL" '{findings: [ (.Results[]?.Vulnerabilities[]? | {title:(.Title // .VulnerabilityID // "Vulnerability"), severity:((.Severity // "UNKNOWN")|ascii_downcase| if .=="unknown" then "info" else . end), category:(.PkgName // "dependency"), url:(.PrimaryURL // $t), testType:"sca"}), (.Results[]?.Secrets[]? | {title:(.Title // .RuleID // "Exposed secret"), severity:((.Severity // "HIGH")|ascii_downcase), category:"secret", url:$t, testType:"secret"}), (.Results[]?.Misconfigurations[]? | {title:(.Title // .ID // "Misconfiguration"), severity:((.Severity // "MEDIUM")|ascii_downcase), category:"iac", url:$t, testType:"iac"}) ]}' trivy-findings.json > trivy-findings.json

      - name: Run Semgrep SAST scan
        if: env.SCAN_DIR != ''
        run: |
          set -uo pipefail
          python3 -m pip install --quiet semgrep || { echo "::warning::Semgrep unavailable"; exit 0; }
          semgrep --config auto --json -o semgrep-findings.json "$SCAN_DIR" || jq -n '{findings: []}' > semgrep-findings.json
          jq '{findings: [ .results[]? | {title:(.extra.message // .check_id), severity:((.extra.severity // "INFO")|if .=="ERROR" then "high" elif .=="WARNING" then "medium" else "low" end), category:"sast", url:(.path + ":" + (.start.line|tostring)), testType:"sast"} ]}' semgrep-findings.json > semgrep-findings.json

      - name: Merge findings
        run: |
          set -uo pipefail
          [ -f trivy-findings.json ] || jq -n '{findings: []}' > trivy-findings.json
          [ -f semgrep-findings.json ] || jq -n '{findings: []}' > semgrep-findings.json
          jq -s '{findings: ((.[0].findings // []) + (.[1].findings // []))}' trivy-findings.json semgrep-findings.json > findings.json
          echo "Findings to post: $(jq '.findings | length' findings.json)"

      - name: Ensure findings.json exists
        run: |
          set -euo pipefail
          [ -f findings.json ] || jq -n '{findings: []}' > findings.json
          echo "Findings to post:"; cat findings.json

      - name: Post results to ASVP
        run: |
          set -euo pipefail
          BODY="$(mktemp)"
          PAYLOAD="$(jq -n --arg scanId "${{ steps.trigger.outputs.scan_id }}" --slurpfile f findings.json '{scanId:$scanId, findings:($f[0].findings), duration:0}')"
          META="$(curl -sS --max-time 60 -o "$BODY" -w '%{http_code} %{content_type}' -X POST "$ASVP_URL/api/cicd/results" -H "Authorization: Bearer $ASVP_TOKEN" -H "Content-Type: application/json" -d "$PAYLOAD")"
          CODE="$(echo "$META" | cut -d' ' -f1)"
          CTYPE="$(echo "$META" | cut -d' ' -f2-)"
          OUT="$(cat "$BODY")"
          jq -n --arg code "$CODE" --arg ctype "$CTYPE" --argjson body "$(echo "$OUT" | jq -c '.' 2>/dev/null || jq -n --arg raw "$OUT" '{raw:$raw}')" '{endpoint:"/api/cicd/results", httpStatus:$code, contentType:$ctype, body:$body}' > results-response.json
          jq -s '{scan: .[0], results: .[1]}' scan-trigger.json results-response.json > scan-result.json
          echo "HTTP $CODE | Content-Type: $CTYPE"
          echo "$OUT"
          CRIT="$(echo "$OUT" | jq -r '.breakdown.critical // 0')"
          HIGH="$(echo "$OUT" | jq -r '.breakdown.high // 0')"
          echo "Ingested — critical=$CRIT high=$HIGH"
          if [ "$CRIT" -gt 0 ]; then echo "::error::$CRIT critical finding(s) — failing build"; exit 1; fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asvp-scan-result
          path: |
            scan-result.json
            scan-trigger.json
            results-response.json
            findings.json
          if-no-files-found: warn
          retention-days: 14
