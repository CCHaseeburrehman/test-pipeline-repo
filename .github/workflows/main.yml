name: ASVP Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ASVP Security Scan
        run: |
          echo "Starting ASVP scan..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.ASVP_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "target": "https://vc.averox.com",
              "profile": "standard",
              "commitSha": "${{ github.sha }}",
              "branchName": "${{ github.ref_name }}",
              "pullRequestId": "${{ github.event.pull_request.number }}"
            }' \
            ${{ secrets.ASVP_BASE_URL }}/api/cli/scan)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          echo "HTTP response code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: ASVP scan API returned $HTTP_CODE"
            echo "$RESPONSE" | head -n-1
            exit 1
          fi

          echo "$RESPONSE" | head -n-1 > scan-result.json
          cat scan-result.json

      - name: Validate JSON
        run: |
          if ! jq empty scan-result.json; then
            echo "Invalid JSON returned from ASVP API"
            cat scan-result.json
            exit 1
          fi

      - name: Check Thresholds
        run: |
          CRITICAL=$(jq '.summary.critical' scan-result.json)
          HIGH=$(jq '.summary.high' scan-result.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Critical findings found!"
            exit 1
          fi

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: asvp-scan-results
          path: scan-result.json
