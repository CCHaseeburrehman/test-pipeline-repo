name: ASVP Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  asvp-source-scan:
    runs-on: ubuntu-latest
    env:
      ASVP_URL: ${{ secrets.ASVP_BASE_URL }}
      ASVP_TOKEN: ${{ secrets.ASVP_API_TOKEN }}
      TARGET_URL: "https://vc.averox.com"
      SCAN_DIR: "."        # <-- Scan your repo root
      CAMPAIGN_ID: ""      # <-- Optional: ASVP campaignId for server-side scan

    steps:
      - uses: actions/checkout@v4

      - name: Preflight (curl, jq, secrets)
        run: |
          set -euo pipefail
          command -v curl >/dev/null || { echo "::error::curl is required"; exit 1; }
          command -v jq   >/dev/null || { echo "::error::jq is required"; exit 1; }
          [ -n "$ASVP_TOKEN" ] || { echo "::error::Secret ASVP_API_TOKEN is missing"; exit 1; }
          [ -n "$ASVP_URL" ]   || { echo "::error::Secret ASVP_BASE_URL is missing"; exit 1; }

      - name: Trigger ASVP scan
        id: trigger
        run: |
          set -euo pipefail
          BODY="$(mktemp)"
          META="$(curl -sS -X POST "$ASVP_URL/api/cicd/scan" \
            -H "Authorization: Bearer $ASVP_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg url "$TARGET_URL" --arg sha "$GITHUB_SHA" --arg br "$GITHUB_REF_NAME" --arg pr "${{ github.event.pull_request.number }}" --arg cid "$CAMPAIGN_ID" \
            '{targetUrl:$url, campaignId:$cid, profile:"standard", triggeredBy:"github-actions", commitSha:$sha, branchName:$br, pullRequestId:$pr}')")"
          CODE="$(echo "$META" | jq -r '.status // empty')"
          SCAN_ID="$(echo "$META" | jq -r '.scanId // empty')"
          echo "scan_id=$SCAN_ID" >> "$GITHUB_OUTPUT"
          echo "$META" > scan-trigger.json
          echo "Registered scanId: $SCAN_ID"

      - name: Run Trivy source scan
        if: env.SCAN_DIR != ''
        run: |
          set -uo pipefail
          command -v trivy >/dev/null 2>&1 || curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --quiet --format json --scanners vuln,secret,misconfig -o trivy-findings.json "$SCAN_DIR" || jq -n '{findings: []}' > trivy-findings.json
          echo "Trivy findings mapped: $(jq '.Results | length' trivy-findings.json)"

      - name: Run Semgrep SAST scan
        if: env.SCAN_DIR != ''
        run: |
          set -uo pipefail
          python3 -m pip install --quiet semgrep || { echo "::warning::Semgrep unavailable"; exit 0; }
          semgrep --config auto --json -o semgrep.json "$SCAN_DIR" || jq -n '{findings: []}' > semgrep.json
          jq '{findings: [ .results[]? | {
            title:(.extra.message // .check_id),
            severity:((.extra.severity // "INFO")|if .=="ERROR" then "high" elif .=="WARNING" then "medium" else "low" end),
            category:"sast", url:(.path + ":" + (.start.line|tostring)), testType:"sast"
          } ]}' semgrep.json > semgrep-findings.json

      - name: Merge Trivy + Semgrep findings
        run: |
          jq -s '{findings: ((.[0].findings // []) + (.[1].findings // []))}' \
            trivy-findings.json semgrep-findings.json > findings.json
          echo "Total findings to post: $(jq '.findings | length' findings.json)"

      - name: Ensure findings.json exists
        run: |
          [ -f findings.json ] || jq -n '{findings: []}' > findings.json
          cat findings.json

      - name: Post results to ASVP
        run: |
          set -euo pipefail
          PAYLOAD="$(jq -n --arg scanId "${{ steps.trigger.outputs.scan_id }}" --slurpfile f findings.json '{scanId:$scanId, findings:($f[0].findings), duration:0}')"
          curl -sS -X POST "$ASVP_URL/api/cicd/results" \
            -H "Authorization: Bearer $ASVP_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > results-response.json
          jq -s '{scan: .[0], results: .[1]}' scan-trigger.json results-response.json > scan-result.json

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asvp-scan-result
          path: |
            scan-result.json
            scan-trigger.json
            results-response.json
            findings.json
          retention-days: 14
